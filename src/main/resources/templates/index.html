<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            background: #0f1115;
            color: #e6e6e6;
            max-width: 880px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
        .subtitle { color: #9a9a9a; font-size: 13px; margin-bottom: 28px; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 720px) {
            .layout { grid-template-columns: 1fr; }
        }

        .card {
            background: #1a1d24;
            border: 1px solid #2a2d35;
            border-radius: 10px;
            padding: 20px;
        }
        .card h2 {
            font-size: 14px;
            font-weight: 500;
            color: #9a9a9a;
            margin: 0 0 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 4px;
        }
        @media (max-width: 720px) {
            form { grid-template-columns: 1fr; }
        }
        input, select {
            background: #14161c;
            border: 1px solid #2a2d35;
            color: #e6e6e6;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: #4a90e2; }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover { background: #3a7bc8; }

        .error-list {
            color: #f87171;
            font-size: 12px;
            margin: 8px 0 16px;
            list-style: none;
            padding: 0;
        }

        .total-box {
            text-align: center;
            padding: 8px 0 20px;
        }
        .total-label { font-size: 12px; color: #9a9a9a; }
        .total-amount { font-size: 32px; font-weight: 600; color: #4ade80; margin-top: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
        th { text-align: left; color: #9a9a9a; font-weight: 500; padding: 8px 10px; border-bottom: 1px solid #2a2d35; }
        td { padding: 10px 10px; border-bottom: 1px solid #1a1d24; }
        .amount-cell { text-align: right; font-weight: 500; }
        .category-tag {
            background: rgba(74, 144, 226, 0.15);
            color: #4a90e2;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: #6a6a6a;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
        }
        .delete-btn:hover { color: #f87171; }
        .empty { color: #6a6a6a; font-size: 13px; padding: 16px 0; }

        .h2-link { margin-top: 24px; font-size: 12px; }
        .h2-link a { color: #6a6a6a; }
    </style>
</head>
<body>

<h1>Expense Tracker</h1>
<p class="subtitle">Log your spending and see where it goes</p>

<div class="card" style="margin-bottom: 24px;">
    <h2>Add an expense</h2>
    <form action="/expenses" method="post" th:object="${expenseForm}">
        <input type="text" th:field="*{description}" placeholder="Description (e.g. Lunch)">
        <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount">
        <select th:field="*{category}">
            <option value="" disabled selected>Category</option>
            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
        </select>
        <input type="date" th:field="*{date}">
        <button type="submit">Add</button>
    </form>
    <ul class="error-list" th:if="${#fields.hasErrors('expenseForm.*')}">
        <li th:each="err : ${#fields.errors('expenseForm.*')}" th:text="${err}"></li>
    </ul>
</div>

<div class="layout">
    <div class="card">
        <h2>Recent expenses</h2>
        <table th:if="${not #lists.isEmpty(expenses)}">
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th style="text-align:right">Amount</th>
                <th></th>
            </tr>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.date}"></td>
                <td th:text="${expense.description}"></td>
                <td><span class="category-tag" th:text="${expense.category}"></span></td>
                <td class="amount-cell" th:text="${'¥' + #numbers.formatDecimal(expense.amount, 1, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <form th:action="@{/expenses/{id}/delete(id=${expense.id})}" method="post" style="margin:0;">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </td>
            </tr>
        </table>
        <p class="empty" th:if="${#lists.isEmpty(expenses)}">No expenses yet — add one above.</p>

        <p class="h2-link"><a href="/h2-console" target="_blank">View database (H2 console)</a></p>
    </div>

    <div class="card">
        <h2>Spending by category</h2>
        <div class="total-box">
            <div class="total-label">Total spent</div>
            <div class="total-amount" th:text="${'¥' + #numbers.formatDecimal(totalSpending, 1, 'COMMA', 0, 'POINT')}"></div>
        </div>
        <canvas id="categoryChart" width="240" height="240"></canvas>
        <p class="empty" th:if="${#lists.isEmpty(chartLabels)}">Add expenses to see the breakdown.</p>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const chartLabels = /*[[${chartLabels}]]*/ [];
    const chartValues = /*[[${chartValues}]]*/ [];
    /*]]>*/

    if (chartLabels.length > 0) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: chartValues,
                    backgroundColor: [
                        '#4a90e2', '#4ade80', '#f87171', '#fbbf24',
                        '#a78bfa', '#34d399', '#f472b6'
                    ],
                    borderColor: '#1a1d24',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#e6e6e6', font: { size: 12 } }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
